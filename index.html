<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Real-Time Collaborative Editor</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f5f5f5;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .container{
      width:90%;
      max-width:1000px;
      background:#fff;
      border-radius:12px;
      padding:20px;
      box-shadow:0 5px 20px rgba(0,0,0,0.2);
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .header h1{
      color:#ff5a1f;
      font-size:30px;
    }

    .status{
      padding:8px 15px;
      background:#28a745;
      color:#fff;
      border-radius:20px;
      font-size:14px;
    }

    .toolbar{
      display:flex;
      gap:10px;
      margin-bottom:15px;
      flex-wrap:wrap;
    }

    .toolbar button{
      padding:10px 15px;
      border:none;
      background:#ff5a1f;
      color:#fff;
      border-radius:6px;
      cursor:pointer;
      transition:0.3s;
    }

    .toolbar button:hover{
      background:#e04812;
    }

    #editor{
      width:100%;
      height:400px;
      border:2px solid #ddd;
      border-radius:10px;
      padding:15px;
      outline:none;
      overflow-y:auto;
      font-size:18px;
      line-height:1.6;
      background:#fafafa;
    }

    .users{
      margin-top:20px;
    }

    .users h3{
      margin-bottom:10px;
      color:#333;
    }

    .user-list{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .user{
      background:#007bff;
      color:white;
      padding:8px 15px;
      border-radius:20px;
      font-size:14px;
    }

    @media(max-width:600px){
      .header{
        flex-direction:column;
        gap:10px;
      }

      .toolbar{
        justify-content:center;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="header">
      <h1>Collaborative Document Editor</h1>
      <div class="status">Online</div>
    </div>

    <div class="toolbar">
      <button onclick="formatText('bold')">Bold</button>
      <button onclick="formatText('italic')">Italic</button>
      <button onclick="formatText('underline')">Underline</button>
      <button onclick="clearEditor()">Clear</button>
      <button onclick="saveDoc()">Save</button>
    </div>

    <div id="editor" contenteditable="true">
      Start typing here...
    </div>

    <div class="users">
      <h3>Active Users</h3>

      <div class="user-list">
        <div class="user">Vinay</div>
        <div class="user">User 2</div>
        <div class="user">User 3</div>
      </div>
    </div>

  </div>

  <script>
    const editor = document.getElementById("editor");

    // Text Formatting
    function formatText(command){
      document.execCommand(command, false, null);
    }

    // Clear Editor
    function clearEditor(){
      editor.innerHTML = "";
    }

    // Save Document
    function saveDoc(){
      const text = editor.innerHTML;

      localStorage.setItem("savedDocument", text);

      alert("Document Saved Successfully!");
    }

    // Load Saved Document
    window.onload = function(){
      const saved = localStorage.getItem("savedDocument");

      if(saved){
        editor.innerHTML = saved;
      }
    };

    // Simulated Real-Time Collaboration
    editor.addEventListener("input", () => {
      console.log("Document Updated in Real-Time");
    });
  </script>

</body>
</html>
